# .github/workflows/update-readme.yml
# Auto-refreshes the "Recent activity" section of the profile README.
# Runs on a schedule and on manual dispatch. Needs the default GITHUB_TOKEN
# (contents: write) — no extra secrets required.
name: Update README

on:
  schedule:
    - cron: "0 */12 * * *"   # every 12 hours
  workflow_dispatch:           # lets you run it on demand from the Actions tab

permissions:
  contents: write

jobs:
  update-activity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update recent activity
        uses: jamesgeorge007/github-activity-readme@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          GH_USERNAME: ocalvo
          COMMIT_MSG: "chore: update recent activity"
          MAX_LINES: 5
